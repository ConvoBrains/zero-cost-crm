name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Smoke tests
        run: npm run smoke

      - name: Build
        run: npm run build
        env:
          # Build does not start the server; keep env explicit for any tooling.
          JWT_SECRET: ci-build-placeholder-not-for-prod
