services:
  crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: convobrains-crm
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
